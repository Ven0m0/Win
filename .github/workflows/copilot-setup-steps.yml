name: copilot-setup-steps

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/copilot-setup-steps.yml'
  pull_request:
    paths:
      - '.github/workflows/copilot-setup-steps.yml'

permissions:
  contents: read

jobs:
  setup:
    name: Prepare Copilot environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install yadm
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes yadm
          yadm --version

      - name: Verify repository guidance paths
        shell: bash
        run: |
          test -f AGENTS.md
          test -f .github/copilot-instructions.md
          test -f .yadm/bootstrap
          test -f Scripts/Setup-Dotfiles.ps1
          test -f Scripts/Common.ps1
          test -d user/.dotfiles/config

      - name: Prepare PowerShell tooling
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force
          Get-Module -ListAvailable PSScriptAnalyzer | Select-Object -First 1 Name, Version
