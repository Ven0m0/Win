name: copilot-setup-steps

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/copilot-setup-steps.yml'
  pull_request:
    paths:
      - '.github/workflows/copilot-setup-steps.yml'

permissions:
  contents: read

jobs:
  setup:
    name: Prepare Copilot environment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare PowerShell tooling
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force
          Get-Module -ListAvailable PSScriptAnalyzer | Select-Object -First 1 Name, Version
