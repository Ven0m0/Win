# PSScriptAnalyzer linting workflow
# Analyzes PowerShell scripts for script quality, best practices, and potential issues.
#
# Rules configured in PSScriptAnalyzerSettings.psd1:
# - AvoidGlobalAliases: Discourages use of global aliases
# - AvoidUsingConvertToSecureStringWithPlainText: Warns against insecure practices
# - AvoidUsingEmptyCatchBlock: Ensures catch blocks handle errors
# - AvoidUsingInvokeExpression: Warns against Invoke-Expression usage
# - UseApprovedVerbs: Ensures cmdlets use approved verbs
# - UseConsistentIndentation: Enforces consistent indentation
# - UseConsistentWhitespace: Enforces consistent whitespace
# - And more...
#
# See: https://github.com/PowerShell/PSScriptAnalyzer

name: PSScriptAnalyzer Lint

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "**.ps1"
      - "**.psm1"
      - "**.psd1"
      - "PSScriptAnalyzerSettings.psd1"
      - ".github/workflows/powershell.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**.ps1"
      - "**.psm1"
      - "**.psd1"
      - "PSScriptAnalyzerSettings.psd1"
      - ".github/workflows/powershell.yml"
  schedule:
    - cron: "27 2 * * 1"

# Cancel in-progress runs for the same workflow + ref to avoid
# duplicate SARIF uploads and wasted runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # required for github/codeql-action/upload-sarif to get the Action run status
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: true
          install: true
      - name: Cache PowerShell modules
        uses: potatoqualitee/psmodulecache@v6.2.1
        continue-on-error: true
        with:
          modules-to-cache: PSScriptAnalyzer

      - name: Validate autounattend XML
        shell: pwsh
        run: |
          $xml = [xml]::new()
          $xml.Load("$PWD/Scripts/auto/autounattend.xml")
          $xml.Load("$PWD/Scripts/auto/autounattend-windows10.xml")

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Continue'

          $psFiles = Get-ChildItem -Recurse -Include *.ps1, *.psm1, *.psd1 -File | Where-Object { $_.FullName -notmatch 'node_modules|\.git' }

          $allResults = @()
          $issues = @()
          $hasErrors = $false

          $sarifLog = @{
            version = "2.1.0"
            "`$schema" = "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json"
            runs = @(
              @{
                tool = @{
                  driver = @{
                    name = "PSScriptAnalyzer"
                    informationUri = "https://github.com/PowerShell/PSScriptAnalyzer"
                    rules = @()
                  }
                }
                results = @()
              }
            )
          }

          $rules = @{}

          foreach ($file in $psFiles) {
            try {
              $results = Invoke-ScriptAnalyzer -Path $file.FullName -Settings .\PSScriptAnalyzerSettings.psd1
              if ($null -ne $results) {
                  $allResults += $results
                  foreach ($result in $results) {
                    if (-not $rules.ContainsKey($result.RuleName)) {
                      $rules[$result.RuleName] = @{
                        id = $result.RuleName
                        name = $result.RuleName
                      }
                      $sarifLog.runs[0].tool.driver.rules += $rules[$result.RuleName]
                    }

                    $level = "none"
                    if ($result.Severity -eq 'Error') {
                      $level = "error"
                      $issues += "[$($file.Name):$($result.Line)] $($result.RuleName): $($result.Message)"
                      $hasErrors = $true
                    } elseif ($result.Severity -eq 'Warning') {
                      $level = "warning"
                    } elseif ($result.Severity -eq 'Information') {
                      $level = "note"
                    }

                    $sarifLog.runs[0].results += @{
                      ruleId = $result.RuleName
                      level = $level
                      message = @{ text = $result.Message }
                      locations = @(
                        @{
                          physicalLocation = @{
                            artifactLocation = @{ uri = $file.FullName.Replace("$PWD/", "").Replace('\', '/') }
                            region = @{
                              startLine = if ($result.Line) { $result.Line } else { 1 }
                              startColumn = if ($result.Column) { $result.Column } else { 1 }
                            }
                          }
                        }
                      )
                    }
                  }
              }
            } catch {
              Write-Warning "Error analyzing $($file.FullName): $_"
            }
          }

          $sarifLog | ConvertTo-Json -Depth 100 | Out-File -FilePath "results.sarif" -Encoding utf8

          if ($hasErrors) {
            Write-Host "## PSScriptAnalyzer found $($issues.Count) error(s):" -ForegroundColor Red
            $issues | ForEach-Object { Write-Host $_ -ForegroundColor Yellow }
            exit 1
          } else {
            Write-Host "## No PSScriptAnalyzer errors found" -ForegroundColor Green
            exit 0
          }

