name: PowerShell Format Check

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "**.ps1"
      - "**.psm1"
      - "**.psd1"
      - ".github/workflows/ps-format.yml"
      - ".editorconfig"
  pull_request:
    branches: ["main"]
    paths:
      - "**.ps1"
      - "**.psm1"
      - "**.psd1"
      - ".github/workflows/ps-format.yml"
      - ".editorconfig"

permissions:
  contents: read

jobs:
  format-check:
    name: Check PowerShell Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed PowerShell files
        id: changed
        shell: pwsh
        run: |
          # Compare against the base branch
          $baseRef = '${{ github.base_ref }}'
          if ($baseRef -and $baseRef -ne '') {
            # Ensure the base ref is available
            git fetch origin "refs/heads/$baseRef" --depth=1 2>$null
            $files = @(git diff --name-only --diff-filter=ACM "origin/$baseRef" HEAD | Where-Object { $_ -match '\.(ps1|psm1|psd1)$' })
          }
          if ($files.Count -eq 0) {
            # Safely fallback to empty instead of checking entire legacy repo
            Write-Host "No specific changed files detected. Skipping legacy full-repo check."
            $files = @()
          }
          "files=$($files -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8BOM
          Write-Host "Changed files: $($files -join ', ')"

      - name: Run formatting check
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Continue'

          $files = @('${{ steps.changed.outputs.files }}'.Split(',') | Where-Object { $_ -and $_.Trim() })
          $issues = @()

          foreach ($file in $files) {
            if (-not (Test-Path $file)) { continue }

            # Read as bytes to check BOM, then as text
            $bytes = [System.IO.File]::ReadAllBytes($file)
            $content = [System.IO.File]::ReadAllText($file, [System.Text.UTF8Encoding]::new($true))

            # ReadAllText with UTF8Encoding automatically strips the BOM if present
            # We don't need to manually substring it, otherwise we lose the first character
            # if ($bytes.Count -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
            #   $content = $content.Substring(1)
            # }

             $lines = $content -split "\r?\n"

            # Check 1: Consistent indentation (2 spaces)
            for ($i = 0; $i -lt $lines.Count; $i++) {
              $line = $lines[$i]
              if ($line -match '^\t') {
                $issues += "[$file]:$($i+1): Line uses tabs instead of spaces"
              }
              # Check for inconsistent indentation (not multiple of 2)
              if ($line -match '^(\s+)') {
                $spaces = $matches[1].Length
                if ($spaces % 2 -ne 0 -and $line -notmatch '^\s*#') {
                  $issues += "[$file]:$($i+1): Indentation not multiple of 2 spaces"
                }
              }
            }

            # Check 2: Line ending - skip for PowerShell files since repo uses CRLF
            # (Repository .gitattributes specifies eol=crlf for .ps1, .psm1, .psd1)

            # Check 3: Trailing whitespace (skip empty lines, handle CRLF)
            for ($i = 0; $i -lt $lines.Count; $i++) {
              $line = $lines[$i]
              $trimmedLine = $line.TrimEnd()
              # Skip empty lines and lines that only have trailing \r (CRLF residue)
              if ($trimmedLine -ne '' -and $trimmedLine -match '\s+$') {
                $issues += "[$file]:$($i+1): Trailing whitespace"
              }
            }

            # Check 4: Max line length (120 chars)
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i].Length -gt 120 -and $lines[$i] -notmatch '^\s*#') {
                $issues += "[$file]:$($i+1): Line exceeds 120 characters ($($lines[$i].Length))"
              }
            }

            # Check 5: File encoding (should be UTF8 with BOM)
            if ($bytes.Count -ge 3) {
              $bom = [System.Text.Encoding]::UTF8.GetPreamble()
              $hasBom = $true
              for ($i = 0; $i -lt $bom.Length; $i++) {
                if ($bytes[$i] -ne $bom[$i]) { $hasBom = $false; break }
              }
              if (-not $hasBom) {
                $issues += "[$file]:: Missing UTF-8 BOM"
              }
            }
          }

          if ($issues.Count -gt 0) {
            Write-Host "## Formatting Issues Found" -ForegroundColor Red
            $issues | ForEach-Object { Write-Host $_ -ForegroundColor Yellow }
            Write-Host ""
            Write-Host "Total issues: $($issues.Count)"
            exit 1
          } else {
            Write-Host "## No formatting issues found" -ForegroundColor Green
            exit 0
          }

      - name: Check for editorconfig compliance
        shell: pwsh
        run: |
          if (Test-Path .editorconfig) {
            Write-Host "EditorConfig found - validating max line length"
            $maxLength = 120
            $files = @('${{ steps.changed.outputs.files }}'.Split(',') | Where-Object { $_ -and $_.Trim() })

            $longLines = @()
            foreach ($file in $files) {
              if (-not (Test-Path $file)) { continue }
              $lines = Get-Content -Path $file
              for ($i = 0; $i -lt $lines.Count; $i++) {
                if ($lines[$i].Length -gt $maxLength -and $lines[$i] -notmatch '^\s*#') {
                  $longLines += "[$file]:$($i+1): $($lines[$i].Length) chars"
                }
              }
            }

            if ($longLines.Count -gt 0) {
              Write-Host "Lines exceeding EditorConfig max line length ($maxLength):" -ForegroundColor Yellow
              $longLines | Select-Object -First 20 | ForEach-Object { Write-Host $_ }
              if ($longLines.Count -gt 20) {
                Write-Host "... and $($longLines.Count - 20) more"
              }
            }
          }
