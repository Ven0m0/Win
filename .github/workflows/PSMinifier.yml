name: PSMinifier

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**.ps1"
      - "**.psm1"
      - ".github/workflows/PSMinifier.yml"
  pull_request:
    paths:
      - "**.ps1"
      - "**.psm1"
      - ".github/workflows/PSMinifier.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minify:
    name: Minify PowerShell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Minify PowerShell files
        id: minify
        uses: StartAutomating/PSMinifier@6d9f510d8171d4985fbc6f4998960404e0a1741e # v1.1.4
        with:
          Include: "*.ps1,*.psm1"

      - name: Display minification results
        if: always()
        run: |
          echo "Original Size: ${{ steps.minify.outputs.OriginalSize }}"
          echo "Minified Size: ${{ steps.minify.outputs.MinifiedSize }}"
          echo "Minified Percent: ${{ steps.minify.outputs.MinifiedPercent }}"

      - name: Commit changes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: minify PowerShell scripts [skip ci]"
          git push

      - name: Create Pull Request
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: minify PowerShell scripts"
          title: "chore: minify PowerShell scripts"
          body: "Automated PowerShell minification"
          branch: minify-ps-${{ github.event.pull_request.number }}
