repos:
  # Ruff - Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Run linter and auto-fix issues
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: ruff-format
        types_or: [python, pyi]
        stages: [pre-commit]
  - repo: https://github.com/DetachHead/basedpyright-prek-mirror
    rev: 1.39.3
    hooks:
      - id: basedpyright
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: detect-private-key
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: forbid-submodules

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.141.2
    hooks:
      - id: renovate-config-validator

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.14
    hooks:
      - id: biome-ci
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-dependabot
      - id: check-github-actions
      - id: check-github-workflows
  - repo: https://github.com/mangiucugna/gha-updater-pre-commit
    rev: v0.1
    hooks:
      - id: gha-update
        stages: [manual]

  # =============================================================================
  # PowerShell hooks
  # =============================================================================
  - repo: https://github.com/thetestlabs/py-psscriptanalyzer
    rev: v0.3.1
    hooks:
      - id: py-psscriptanalyzer
        args: ["--severity", "Warning"]
        files: \.(ps1|psm1|psd1)$
        stages: [pre-commit]
      - id: py-psscriptanalyzer-format
        files: \.(ps1|psm1|psd1)$
        stages: [pre-commit]
  
  - repo: local
    hooks:
      - id: psscriptanalyzer-lint
        name: PSScriptAnalyzer (Lint)
        description: Run PSScriptAnalyzer for PowerShell linting
        entry: pwsh -NoProfile -File .github/scripts/Lint-PowerShell.ps1 -CheckMode
        language: system
        types: [powershell]
        files: \.(ps1|psm1|psd1)$
        stages: [pre-commit]

      - id: psscriptanalyzer-format
        name: PowerShell Format Check
        description: Check PowerShell file formatting (indentation, BOM, trailing whitespace)
        entry: pwsh -NoProfile -File .github/scripts/Format-PowerShell.ps1 -CheckMode
        language: system
        types: [powershell]
        files: \.(ps1|psm1|psd1)$
        stages: [pre-commit]

      - id: pester-tests
        name: Pester Tests
        description: Run Pester unit tests for PowerShell scripts
        entry: pwsh -NoProfile -File .github/scripts/Test-PowerShell.ps1
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: false
