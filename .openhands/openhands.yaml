# OpenHands Configuration for Ven0m0/Win
# Windows dotfiles and optimization suite

# Repository metadata
repository:
  name: Ven0m0/Win
  type: windows-dotfiles
  primary_language: powershell

# Skill directories - where to find reusable agent skills
skills:
  paths:
    - .github/skills          # GitHub-relative skills
    - .claude/skills          # Claude-specific skills
    - .openhands/skills       # OpenHands-specific skills

# Agent directories - file-based agents
agents:
  paths:
    - .agents/agents          # Project-level agents
    - .claude/agents          # Claude-specific agents

# Default task configuration
defaults:
  shell:
    enabled: true
    timeout: 300
  
  file_editor:
    auto_backup: true
    backup_dir: .agents_tmp/backups

# Pre-commit hooks
hooks:
  pre_commit:
    script: .openhands/pre-commit.sh
    enabled: true
    fail_fast: false

  post_commit:
    script: .openhands/post-commit.sh
    enabled: false
    fail_fast: false

# Task definitions
tasks:
  validate-powershell:
    description: "Validate PowerShell scripts with PSScriptAnalyzer"
    command: pwsh -NoProfile -File .github/scripts/Lint-PowerShell.ps1 -CheckMode

  test-powershell:
    description: "Run Pester tests for PowerShell scripts"
    command: pwsh -NoProfile -File .github/scripts/Test-PowerShell.ps1

  bootstrap:
    description: "Install dotbot and deploy dotfiles"
    command: mise run bootstrap

  deploy:
    description: "Deploy dotfiles"
    command: dotbot -c install.conf.yaml

# Environment
env:
  PSModulePath: "Scripts;$HOME/Documents/PowerShell/Modules"
  DOTBOT_DIR: "."
  DOTBOT_CONFIG: "install.conf.yaml"
